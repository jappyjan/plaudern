# Full local stack for Plaudern: Postgres (metadata), MinIO (S3-compatible
# blobs), Redis (BullMQ), the API, and the web frontend.
#
#   docker compose up -d --build     # web at http://localhost:8080
#
# Run only the infra (and api/web via `nx serve api` / `nx serve web`) with:
#   docker compose up -d postgres minio minio-init redis
#
# AI is configured PER USER inside the app (Settings → AI), not via env vars:
# add a provider connection (DeepSeek/OpenAI/ElevenLabs/pyannoteAI/Ollama/…) and
# assign it to capabilities (summarization, transcription, diarization, OCR, …).
# The stack runs with no AI configured — those extraction jobs just no-op until
# a user sets a provider up.
#
# Fully local model tier (no cloud AI at all): uncomment the `whisper` and
# `ollama` services below, then in Settings → AI add a Whisper provider pointing
# at http://whisper:8000/v1 (assign it to transcription) and an OpenAI-compatible
# provider pointing at http://ollama:11434/v1 (assign it to the LLM capabilities).
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://plaudern:plaudern@postgres:5432/plaudern
      DATABASE_SYNCHRONIZE: 'false'
      STORAGE_DRIVER: s3
      # Internal endpoint for server-side S3 ops.
      S3_ENDPOINT: http://minio:9000
      # Endpoint baked into presigned URLs handed to clients. Override with your
      # LAN IP (e.g. http://192.168.1.100:9000) to upload from another device.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: us-east-1
      S3_BUCKET: plaudern-inbox
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
      QUEUE_DRIVER: bull
      REDIS_URL: redis://redis:6379
      # General-purpose key encrypting secrets stored in Postgres (e.g. the
      # Plaud password) — override in production.
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-change-me}
      # --- Authentication (passkeys / WebAuthn) ---
      # The domain the web app is served from; passkeys are cryptographically
      # bound to it. 'localhost' works locally — set your real domain when
      # deploying behind a proxy/TLS.
      AUTH_RP_ID: ${AUTH_RP_ID:-localhost}
      # Comma-separated origins accepted in WebAuthn ceremonies and CORS.
      # Empty = localhost dev/prod ports for AUTH_RP_ID=localhost, otherwise
      # https://<AUTH_RP_ID>.
      AUTH_ORIGINS: ${AUTH_ORIGINS:-}
      # 'false' locks the instance to existing accounts (the very first
      # account can always be created).
      AUTH_ALLOW_REGISTRATION: ${AUTH_ALLOW_REGISTRATION:-true}
      # 'true' restores the old unauthenticated single-user mode.
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      PLAUD_POLL_INTERVAL_MS: ${PLAUD_POLL_INTERVAL_MS:-300000}
      # Calendar feeds: APP_ENCRYPTION_SECRET also encrypts the feed URLs.
      CALENDAR_POLL_INTERVAL_MS: ${CALENDAR_POLL_INTERVAL_MS:-900000}
      # --- AI configuration ---
      # NOTE: AI provider credentials and per-capability settings (summarization,
      # transcription, diarization, embeddings, OCR, and every LLM extractor) are
      # now configured PER USER in the app, under Settings → AI — NOT via env
      # vars. There is nothing to set here. On upgrade from an env-based install,
      # the old AI env is imported once into the DB (AiConfigImportService).
      # Future maintainers: do NOT reintroduce AI env vars — add a capability to
      # the DB-backed registry instead (libs/backend/ai-config).
      # --- Native Google Calendar (optional) ---
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_APP_BASE_URL: ${GOOGLE_APP_BASE_URL:-}
      PORT: 3000
    ports:
      - '3000:3000'

  postgres:
    # pgvector/pgvector ships the `vector` extension used by embedding_chunks
    # (ATT-659); it is otherwise a drop-in for the stock postgres:17 image.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: plaudern
      POSTGRES_PASSWORD: plaudern
      POSTGRES_DB: plaudern
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plaudern']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow presigned-PUT from browsers/RN clients.
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # Creates the inbox bucket, then exits. Its retry loop is what gates readiness.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/plaudern-inbox;
      echo 'minio bucket ready';
      "

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Local model tier (fully self-hostable, no cloud AI) ---
  # Uncomment both services below, then configure them PER USER in Settings → AI:
  #   - a Whisper provider at http://whisper:8000/v1  → assign to transcription
  #   - an OpenAI-compatible provider at http://ollama:11434/v1 (model e.g.
  #     llama3.1, `ollama pull` it first) → assign to summarization and the
  #     other LLM capabilities.

  # whisper:
  #   # OpenAI-compatible `/v1/audio/transcriptions` server; no model weights
  #   # ship with this app or image — it downloads/caches the model itself on
  #   # first request. See https://github.com/speaches-ai/speaches for GPU
  #   # variants and more model options.
  #   image: ghcr.io/speaches-ai/speaches:latest-cpu
  #   restart: unless-stopped
  #   environment:
  #     WHISPER_MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-small}
  #   ports:
  #     - '8000:8000'
  #   volumes:
  #     - whispermodels:/home/ubuntu/.cache/huggingface

  # ollama:
  #   # OpenAI-compatible LLM server for local summarization. Pull a model
  #   # once the container is up: `docker compose exec ollama ollama pull
  #   # llama3.1` (or any model that fits your hardware).
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   ports:
  #     - '11434:11434'
  #   volumes:
  #     - ollamamodels:/root/.ollama

volumes:
  pgdata:
  miniodata:
  redisdata:
  # whispermodels:
  # ollamamodels:
