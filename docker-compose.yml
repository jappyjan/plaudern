# Full local stack for Plaudern (plan §6): Postgres (metadata), MinIO
# (S3-compatible blobs), Redis (BullMQ), the API, and the web frontend.
#
#   docker compose up -d --build     # web at http://localhost:8080
#
# Run only the infra (and api/web via `nx serve api` / `nx serve web`) with:
#   docker compose up -d postgres minio minio-init redis
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://plaudern:plaudern@postgres:5432/plaudern
      DATABASE_SYNCHRONIZE: 'false'
      STORAGE_DRIVER: s3
      # Internal endpoint for server-side S3 ops.
      S3_ENDPOINT: http://minio:9000
      # Endpoint baked into presigned URLs handed to clients. Override with your
      # LAN IP (e.g. http://192.168.1.100:9000) to upload from another device.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: us-east-1
      S3_BUCKET: plaudern-inbox
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
      QUEUE_DRIVER: bull
      REDIS_URL: redis://redis:6379
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-stub}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-whisper-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Encrypts the Plaud password stored in Postgres — override in production.
      PLAUD_SETTINGS_SECRET: ${PLAUD_SETTINGS_SECRET:-change-me}
      PLAUD_POLL_INTERVAL_MS: ${PLAUD_POLL_INTERVAL_MS:-300000}
      PORT: 3000
    ports:
      - '3000:3000'

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plaudern
      POSTGRES_PASSWORD: plaudern
      POSTGRES_DB: plaudern
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plaudern']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow presigned-PUT from browsers/RN clients.
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # Creates the inbox bucket, then exits. Its retry loop is what gates readiness.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/plaudern-inbox;
      echo 'minio bucket ready';
      "

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  miniodata:
  redisdata:
