# Plaudern — Coolify deployment compose.
#
# Uses Coolify "magic" environment variables:
#   SERVICE_FQDN_<SVC>_<PORT>  -> Coolify generates a domain + routes it through
#                                 its proxy to that container port. Referencing
#                                 ${SERVICE_FQDN_<SVC>_<PORT>} yields the URL.
#   SERVICE_USER_<ID> /
#   SERVICE_PASSWORD_<ID>      -> Coolify generates & persists a random value the
#                                 first time it's referenced.
# Plain ${VARS} (e.g. ELEVENLABS_API_KEY) are surfaced in the Coolify UI to fill in.
#
# Only `web`, `api` and `minio` are exposed; postgres/redis stay on the internal
# network. Access is protected by passkey (WebAuthn) login — set AUTH_RP_ID to
# the web app's domain so passkeys bind to it.
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      # Public URL for the web app (Coolify provisions TLS + domain).
      # nginx inside the container proxies /api to the api service.
      - SERVICE_FQDN_WEB_80
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      # Public URL for the API (Coolify provisions TLS + domain).
      - SERVICE_FQDN_API_3000
      - PORT=3000
      - DATABASE_DRIVER=postgres
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/plaudern
      - DATABASE_SYNCHRONIZE=false
      - STORAGE_DRIVER=s3
      # Internal endpoint for server-side S3 ops...
      - S3_ENDPOINT=http://minio:9000
      # ...public endpoint baked into presigned URLs handed to clients.
      # SERVICE_URL_* includes the scheme and proxy-routed port (80/443);
      # SERVICE_FQDN_*_9000 resolves to host:9000 which isn't publicly routed.
      - S3_PUBLIC_ENDPOINT=${SERVICE_URL_MINIO}
      - S3_REGION=us-east-1
      - S3_BUCKET=plaudern-inbox
      - S3_ACCESS_KEY=${SERVICE_USER_MINIO}
      - S3_SECRET_KEY=${SERVICE_PASSWORD_MINIO}
      - S3_FORCE_PATH_STYLE=true
      - QUEUE_DRIVER=bull
      - REDIS_URL=redis://:${SERVICE_PASSWORD_REDIS}@redis:6379
      # General-purpose encryption key for secrets stored in the database
      # (e.g. the Plaud password): Coolify generates & persists it.
      - APP_ENCRYPTION_SECRET=${SERVICE_PASSWORD_APPENCRYPTION}
      # Passkey (WebAuthn) auth: the RP id must be the web app's domain.
      # SERVICE_FQDN_WEB is the (scheme-less) domain Coolify routes to the
      # web service, so this auto-populates; override AUTH_RP_ID only for
      # custom setups. NOTE: if you change the web domain later, passkeys
      # registered under the old domain stop working — that's inherent to
      # WebAuthn, not a config problem.
      - AUTH_RP_ID=${AUTH_RP_ID:-${SERVICE_FQDN_WEB}}
      # Accepted browser origins; defaults to https://<AUTH_RP_ID> in the
      # api, so an override is only needed for multi-origin setups.
      - AUTH_ORIGINS=${AUTH_ORIGINS}
      - AUTH_ALLOW_REGISTRATION=${AUTH_ALLOW_REGISTRATION:-true}
      - PLAUD_POLL_INTERVAL_MS=${PLAUD_POLL_INTERVAL_MS:-300000}
      # Calendar feeds: the same secret encrypts subscribed feed URLs.
      - CALENDAR_POLL_INTERVAL_MS=${CALENDAR_POLL_INTERVAL_MS:-900000}
      # Automatic startup backfill: on every API boot, each enabled extraction
      # kind is re-run over past items whose step is missing or failed for the
      # current extractor version, so merging a new/improved processing step
      # migrates old data automatically (no manual backfill). ON by default;
      # the sweep is non-blocking and self-throttling (advisory-locked so only
      # one replica runs it, skip-if-still-running across reboots). Uncomment to
      # disable, or to change the settle delay (ms) before the sweep starts.
      # - STARTUP_BACKFILL_ENABLED=${STARTUP_BACKFILL_ENABLED:-true}
      # - STARTUP_BACKFILL_DELAY_MS=${STARTUP_BACKFILL_DELAY_MS:-15000}
      # Startup contact resolution: on every boot, still-unlinked person
      # entities are re-resolved against the contact book from data already
      # stored (mentions, voices, knowledge graph) — no re-extraction, so it
      # is cheap. The LLM arbiter reuses the ENTITY_EXTRACTION_* credentials
      # (override with CONTACT_RESOLUTION_* to diverge). ON by default.
      # - CONTACT_RESOLUTION_STARTUP_ENABLED=${CONTACT_RESOLUTION_STARTUP_ENABLED:-true}
      # - CONTACT_RESOLUTION_STARTUP_DELAY_MS=${CONTACT_RESOLUTION_STARTUP_DELAY_MS:-20000}
      # AI summarization (title + Markdown summary once a recording is
      # transcribed and diarized). Empty key = disabled (UI shows the transcript
      # only). Defaults target DeepSeek — the cheapest capable option; point
      # BASE_URL/MODEL at any OpenAI-compatible endpoint to switch providers.
      - SUMMARIZATION_API_KEY=${SUMMARIZATION_API_KEY}
      - SUMMARIZATION_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - SUMMARIZATION_MODEL=${SUMMARIZATION_MODEL:-deepseek-chat}
      # Entity/relation extraction and topic classification reuse the
      # summarization key and endpoint (same DeepSeek account) — a non-empty
      # key auto-enables them. Only the models are independently overridable;
      # set the *_MODEL vars in Coolify to diverge from the summarization tier.
      - ENTITY_EXTRACTION_API_KEY=${SUMMARIZATION_API_KEY}
      - ENTITY_EXTRACTION_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - ENTITY_EXTRACTION_MODEL=${ENTITY_EXTRACTION_MODEL:-deepseek-chat}
      - TOPICS_API_KEY=${SUMMARIZATION_API_KEY}
      - TOPICS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - TOPICS_MODEL=${TOPICS_MODEL:-deepseek-chat}
      - COMMITMENTS_API_KEY=${SUMMARIZATION_API_KEY}
      - COMMITMENTS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - COMMITMENTS_MODEL=${COMMITMENTS_MODEL:-deepseek-chat}
      # Open-question extraction (JJ-34) reuses the summarization key/endpoint;
      # a non-empty key auto-enables it. Only the model is independently
      # overridable via QUESTIONS_MODEL.
      - QUESTIONS_API_KEY=${SUMMARIZATION_API_KEY}
      - QUESTIONS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - QUESTIONS_MODEL=${QUESTIONS_MODEL:-deepseek-chat}
      # Embeddings power semantic recall (MCP search_memory, similarity,
      # hybrid search). They CANNOT reuse the summarization key: DeepSeek has
      # no embeddings API. Fill in EMBEDDINGS_API_KEY with an OpenAI key —
      # a non-empty key auto-enables the extractor. Defaults target OpenAI
      # text-embedding-3-small (1536 dims); for a keyless local endpoint such
      # as Ollama set EMBEDDINGS_ENABLED=true and point BASE_URL/MODEL/
      # DIMENSIONS at it instead. Changing model or dimensions later requires
      # re-embedding (POST /v1/extractions/backfills {"kind":"embeddings"}).
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
      - EMBEDDINGS_BASE_URL=${EMBEDDINGS_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-small}
      - EMBEDDINGS_DIMENSIONS=${EMBEDDINGS_DIMENSIONS:-1536}
      - EMBEDDINGS_ENABLED=${EMBEDDINGS_ENABLED:-false}
      # Task extraction (JJ-35) reuses the summarization key/endpoint; a
      # non-empty key auto-enables it. Semantic dedupe of tasks piggybacks on
      # the embeddings provider above (EMBEDDINGS_*) when configured, else
      # falls back to normalized-text matching.
      - TASKS_API_KEY=${SUMMARIZATION_API_KEY}
      - TASKS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - TASKS_MODEL=${TASKS_MODEL:-deepseek-chat}
      # Personal-fact extraction (JJ-31) reuses the summarization key/endpoint; a
      # non-empty key auto-enables it. Facts are scoped to registry people and
      # accumulate append-only with supersession (newer facts replace older
      # without deleting them).
      - FACTS_API_KEY=${SUMMARIZATION_API_KEY}
      - FACTS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - FACTS_MODEL=${FACTS_MODEL:-deepseek-chat}
      # Decision-log extraction (JJ-33) reuses the summarization key/endpoint; a
      # non-empty key auto-enables it. Decisions ("we decided to go with the
      # cheaper option") accumulate into a searchable log with context,
      # participants, and reasoning. Only the model is independently overridable
      # via DECISIONS_MODEL.
      - DECISIONS_API_KEY=${SUMMARIZATION_API_KEY}
      - DECISIONS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - DECISIONS_MODEL=${DECISIONS_MODEL:-deepseek-chat}
      # Prospective-memory reminders (JJ-25) reuse the summarization key/endpoint;
      # a non-empty key auto-enables it. Anything with a future date ("results by
      # the 14th", contract expiries, "let's talk again next month") becomes a
      # calendar-visible reminder. Only the model is independently overridable
      # via REMINDERS_MODEL.
      - REMINDERS_API_KEY=${SUMMARIZATION_API_KEY}
      - REMINDERS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - REMINDERS_MODEL=${REMINDERS_MODEL:-deepseek-chat}
      # Memory chat (JJ-37) reuses the summarization key/endpoint; a non-empty
      # key auto-enables it. Retrieval quality depends on the embeddings
      # provider above (keyword search still works without it).
      - CHAT_API_KEY=${SUMMARIZATION_API_KEY}
      - CHAT_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - CHAT_MODEL=${CHAT_MODEL:-deepseek-chat}
      # Living topic documents (JJ-12) reuse the summarization key/endpoint; a
      # non-empty key auto-enables generation. Each topic gets an evergreen,
      # self-updating cited Markdown document that regenerates when a new item
      # is classified into it. Only the model is independently overridable.
      - TOPIC_DOCS_API_KEY=${SUMMARIZATION_API_KEY}
      - TOPIC_DOCS_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - TOPIC_DOCS_MODEL=${TOPIC_DOCS_MODEL:-deepseek-chat}
      # Auto-journal (JJ-17) reuses the summarization key/endpoint; a non-empty
      # key auto-enables composition. Every evening the day is composed from its
      # signals (recordings, calendar events) into a cited narrative diary
      # entry, and weekly/monthly/yearly reviews compose from the dailies. Only
      # the model is independently overridable.
      - JOURNAL_API_KEY=${SUMMARIZATION_API_KEY}
      - JOURNAL_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - JOURNAL_MODEL=${JOURNAL_MODEL:-deepseek-chat}
      # Citation verification pass (JJ-20) reuses the summarization key/endpoint;
      # a non-empty key auto-enables it. An LLM-judge re-checks the high-stakes
      # fields (dates, amounts, names) of a memory-chat answer against its cited
      # source passages and downgrades confidence when one isn't supported. With
      # no key set the pass is skipped and the dependency-free clause-level
      # citation-coverage check still runs. Only the model is independently
      # overridable.
      - VERIFICATION_API_KEY=${SUMMARIZATION_API_KEY}
      - VERIFICATION_BASE_URL=${SUMMARIZATION_BASE_URL:-https://api.deepseek.com/v1}
      - VERIFICATION_MODEL=${VERIFICATION_MODEL:-deepseek-chat}
      # Sensitivity sentinel (JJ-21). The deterministic detectors (IBAN, card,
      # credentials, national IDs) ALWAYS run with no key. The OPTIONAL LLM
      # classifier catches nuanced cases (health details, other people's
      # secrets) and is DISABLED until a key is set — it sees the raw transcript,
      # so point SENTINEL_LLM_BASE_URL at a local endpoint to keep it private.
      # Leave the key empty to run detectors-only (recommended default).
      - SENTINEL_LLM_API_KEY=${SENTINEL_LLM_API_KEY:-}
      - SENTINEL_LLM_BASE_URL=${SENTINEL_LLM_BASE_URL:-https://api.deepseek.com/v1}
      - SENTINEL_LLM_MODEL=${SENTINEL_LLM_MODEL:-deepseek-chat}
      # Local-only routing (JJ-21): items classified sensitive/secret are NEVER
      # sent to an external LLM — enforced, not trusted. The routing guard reads
      # the SAME `<KIND>_BASE_URL` each extractor's provider reads and only lets a
      # sensitive item run a kind whose endpoint resolves to a loopback/private
      # address (localhost, 127.x, 10/172.16-31/192.168.x, *.local, a Docker
      # service name, …). To process sensitive items locally, point the gated
      # kinds at a local OpenAI-compatible server (Ollama, llama.cpp), e.g.
      # SUMMARIZATION_BASE_URL=http://ollama:11434/v1 and likewise ENTITY_
      # EXTRACTION_/TOPICS_/COMMITMENTS_/TASKS_/FACTS_/QUESTIONS_/DECISIONS_/
      # REMINDERS_/EMBEDDINGS_BASE_URL. Any kind left pointed at a cloud endpoint
      # HOLDS its sensitive items ("needs local model") instead of leaking them.
      # No extra env is needed — the endpoints above ARE the local tier.
      # Transcription: the hosted ElevenLabs Scribe API — fill in
      # ELEVENLABS_API_KEY (get one at elevenlabs.io). Audio bytes are uploaded
      # to ElevenLabs directly (storage stays private).
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      # Speaker diarization: the hosted pyannoteAI API — fill in
      # PYANNOTEAI_API_KEY (get one at pyannote.ai), or set
      # SPEAKER_ID_PROVIDER=off to disable. Audio is uploaded to pyannoteAI
      # directly (storage stays private); voiceprints for new speakers are
      # enrolled from clips sliced in-process with ffmpeg.
      - SPEAKER_ID_PROVIDER=${SPEAKER_ID_PROVIDER:-pyannoteai}
      - PYANNOTEAI_API_KEY=${PYANNOTEAI_API_KEY}
      - PYANNOTEAI_MODEL=${PYANNOTEAI_MODEL:-precision-2}
      # Minimum confidence (0-100) to accept a voiceprint match. 0 force-matches
      # known voices into recordings they aren't in; 50 is pyannoteAI's
      # recommended strict floor. Raise toward 70 for stricter matching.
      - PYANNOTEAI_MATCH_THRESHOLD=${PYANNOTEAI_MATCH_THRESHOLD:-50}
      # Email-in (mailbox): every user gets an inbox+<token>@<domain> address;
      # mail sent there becomes an inbox item. Set EMAIL_INBOUND_DOMAIN to the
      # domain your inbound mail relay (SES, Mailgun, Postmark, a self-hosted
      # Postfix, ...) receives for, and configure the relay to POST raw MIME to
      # https://<api-domain>/api/v1/webhooks/email with the x-webhook-secret
      # header set to EMAIL_WEBHOOK_SECRET (Coolify generates & persists it —
      # copy the value into your relay's config). Domain empty = feature off.
      - EMAIL_INBOUND_DOMAIN=${EMAIL_INBOUND_DOMAIN:-}
      - EMAIL_WEBHOOK_SECRET=${SERVICE_PASSWORD_EMAILWEBHOOK}
      # Outbound notifications — email channel via SMTP (any relay works).
      # SMTP_HOST empty = channel off; the settings UI shows it unconfigured.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-Plaudern <notifications@plaudern.local>}
      # true = implicit TLS (set it when using port 465), false = STARTTLS.
      - SMTP_SECURE=${SMTP_SECURE:-false}
      # Outbound notifications — web-push channel. Generate a key pair once
      # with `npx web-push generate-vapid-keys` and paste both here. Keys
      # empty = channel off.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      # Contact URI (mailto: or https:) sent to push services, per VAPID spec.
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@plaudern.local}
      # Native Google Calendar (optional): set these in Coolify to enable it.
      # REDIRECT_URI must be your API's public URL + /v1/calendar/google/callback.
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - GOOGLE_APP_BASE_URL=${GOOGLE_APP_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      # Migrations must apply cleanly before the API starts; a failed migration
      # fails the deploy here instead of the API booting and serving 500s.
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot migration gate. Runs pending TypeORM migrations against Postgres
  # and exits (0 on success, non-zero on failure); the `api` service waits for
  # it via service_completed_successfully. This makes a broken or un-appliable
  # migration fail the deploy loudly, instead of the API booting and returning
  # 500s per request — the failure mode behind the missing `autoLink` column.
  # Same image as `api`; only the command differs.
  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Explicit: Coolify injects `unless-stopped` on services without a restart
    # policy, which would make this one-shot container restart forever and hang
    # the deploy on the api's service_completed_successfully condition.
    restart: 'no'
    command: ['node', 'dist/server/apps/api/src/migrate.js']
    environment:
      - DATABASE_DRIVER=postgres
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/plaudern
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    # pgvector/pgvector ships the `vector` extension used by embedding_chunks
    # (ATT-659); it is otherwise a drop-in for the stock postgres:17 image.
    # Alpine has no pgvector variant, so this is the Debian-based pg17 image.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=plaudern
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SERVICE_USER_POSTGRES} -d plaudern']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Public S3 API endpoint (used for presigned uploads/downloads).
      - SERVICE_FQDN_MINIO_9000
      # Optional: expose the MinIO console on its own domain.
      - SERVICE_FQDN_MINIOCONSOLE_9001
      - MINIO_ROOT_USER=${SERVICE_USER_MINIO}
      - MINIO_ROOT_PASSWORD=${SERVICE_PASSWORD_MINIO}
      - MINIO_SERVER_URL=${SERVICE_URL_MINIO}
      - MINIO_BROWSER_REDIRECT_URL=${SERVICE_URL_MINIOCONSOLE}
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    # Explicit: Coolify injects `unless-stopped` on services without a restart
    # policy, which makes this one-shot container restart forever and the
    # api's service_completed_successfully condition hang the whole deploy.
    restart: 'no'
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${SERVICE_USER_MINIO} ${SERVICE_PASSWORD_MINIO}; do sleep 1; done;
      mc mb --ignore-existing local/plaudern-inbox;
      echo 'minio bucket ready';
      "

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${SERVICE_PASSWORD_REDIS}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${SERVICE_PASSWORD_REDIS}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  miniodata:
  redisdata:
