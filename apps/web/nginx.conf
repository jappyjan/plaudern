server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Server-sent events: must not be buffered or the stream never reaches
    # the browser, and the connection has to survive long idle periods.
    location /api/v1/events {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # Same-origin API: the SPA always calls relative /api/... URLs.
    # Uploads don't pass through here — clients PUT directly to object storage.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for client-side routes (/items/:id).
    location / {
        try_files $uri /index.html;
    }
}
